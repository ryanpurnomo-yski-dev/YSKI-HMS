services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www
    command: ["php-fpm"]
    volumes:
      - ./:/var/www
      - vendor:/var/www/vendor
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: newlaravel
      DB_USERNAME: root
      DB_PASSWORD: password
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  web:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  vite:
    image: node:20-alpine
    working_dir: /var/www
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: newlaravel
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
  node_modules:
  vendor:
